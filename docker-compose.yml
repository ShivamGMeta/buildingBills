services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: bills
      POSTGRES_PASSWORD: bills
      POSTGRES_DB: buildingbills
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bills"]
      interval: 5s
      retries: 10

  api:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg2://bills:bills@postgres:5432/buildingbills
      SMTP_HOST: mailpit
      SMTP_PORT: "1025"
      SECRET_KEY: dev-only-secret
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      mailpit:
        condition: service_started
    volumes:
      - billstorage:/app/storage

  mailpit:
    image: axllent/mailpit
    ports:
      - "8025:8025"   # web UI
      - "1025:1025"   # SMTP

volumes:
  pgdata:
  billstorage:
